<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmation - MEZANEYO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .icon { font-size: 60px; margin-bottom: 10px; }
        h2 { color: #1a2a3a; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #2d6a4f;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover { background: #1b4332; }
        .success { color: #155724; background: #d4edda; padding: 15px; border-radius: 8px; }
        .error { color: #721c24; background: #f8d7da; padding: 15px; border-radius: 8px; }
        .loading { color: #004085; background: #cce5ff; padding: 15px; border-radius: 8px; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2d6a4f;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✉️</div>
        <h2>Email Confirmation</h2>
        <div id="status">
            <div class="loading">
                <div class="spinner"></div>
                <p>⏳ Verifying your email...</p>
            </div>
        </div>
        <p id="message"></p>
        <a href="login.html" class="btn hidden" id="loginBtn">🔐 Go to Login</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://nivmrwbusbeppdssmfpj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_kwF_yAmJ5AWnbaIe57snrw_fXng7-6a';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function confirmEmail() {
            const statusDiv = document.getElementById('status');
            const messageDiv = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');

            try {
                const hash = window.location.hash.substring(1);
                const params = new URLSearchParams(hash);
                const accessToken = params.get('access_token');
                const refreshToken = params.get('refresh_token');
                const type = params.get('type');

                // Also check URL query params
                const urlParams = new URLSearchParams(window.location.search);
                const urlAccessToken = urlParams.get('access_token');
                const urlRefreshToken = urlParams.get('refresh_token');

                const token = accessToken || urlAccessToken;
                const refresh = refreshToken || urlRefreshToken;

                if (!token) {
                    // Check if already logged in
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session) {
                        statusDiv.innerHTML = `<div class="success">✅ You are already logged in!</div>`;
                        messageDiv.textContent = 'Redirecting to dashboard...';
                        loginBtn.classList.remove('hidden');
                        loginBtn.textContent = '📊 Go to Dashboard';
                        loginBtn.href = 'admin-dashboard.html';
                        setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 2000);
                        return;
                    }
                    statusDiv.innerHTML = `<div class="error">❌ Invalid confirmation link</div>`;
                    messageDiv.textContent = 'The link is invalid or expired. Please try signing up again.';
                    loginBtn.classList.remove('hidden');
                    return;
                }

                // Set session with tokens
                const { data, error } = await supabaseClient.auth.setSession({
                    access_token: token,
                    refresh_token: refresh || ''
                });

                if (error) throw error;

                statusDiv.innerHTML = `<div class="success">✅ Email confirmed successfully!</div>`;
                messageDiv.textContent = '🎉 Your account is now active! You can now login.';
                loginBtn.classList.remove('hidden');
                loginBtn.textContent = '🔐 Login Now';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);

            } catch (error) {
                console.error('Confirmation error:', error);
                
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    statusDiv.innerHTML = `<div class="success">✅ Your email is already confirmed!</div>`;
                    messageDiv.textContent = 'You are already logged in. Redirecting...';
                    loginBtn.classList.remove('hidden');
                    loginBtn.textContent = '📊 Go to Dashboard';
                    loginBtn.href = 'admin-dashboard.html';
                    setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 2000);
                    return;
                }

                statusDiv.innerHTML = `<div class="error">❌ Confirmation failed</div>`;
                messageDiv.textContent = error.message || 'Something went wrong. Please try again.';
                loginBtn.classList.remove('hidden');
            }
        }

        window.onload = confirmEmail;
    </script>
</body>
</html>
