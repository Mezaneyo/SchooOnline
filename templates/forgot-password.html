<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MEZANEYO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #1a2a3a 0%, #2d6a4f 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 16px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .container .logo { text-align: center; margin-bottom: 30px; }
        .container .logo h2 { color: #1a2a3a; font-size: 28px; }
        .container .logo h2 span { color: #2d6a4f; }
        .container .logo p { color: #666; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; font-family: 'Poppins', sans-serif; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #2d6a4f; }
        .btn { width: 100%; padding: 14px; background: #2d6a4f; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #1b4332; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
        .link a { color: #2d6a4f; text-decoration: none; font-weight: 600; }
        .link a:hover { text-decoration: underline; }
        .success-msg, .error-msg { padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 14px; }
        .success-msg { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error-msg { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h2>🔐 <span>Forgot Password</span></h2>
            <p>Enter your email address and we'll send you a reset link.</p>
        </div>

        <div id="successMsg" class="success-msg">✅ <span id="successText">Reset link sent!</span></div>
        <div id="errorMsg" class="error-msg">❌ <span id="errorText">Error message</span></div>

        <form id="forgotForm" onsubmit="return false;">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@mezaneyo.school" required>
            </div>
            <button class="btn" id="resetBtn" onclick="sendResetLink()">📧 Send Reset Link</button>
        </form>

        <div class="link">
            Remember your password? <a href="/login">Sign in</a>
        </div>
    </div>

    <script>
        async function sendResetLink() {
            var email = document.getElementById('email').value.trim();
            var btn = document.getElementById('resetBtn');
            
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';

            if (!email || !email.includes('@')) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorText').textContent = 'Please enter a valid email address';
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Sending...';

            try {
                // In production, this would call Supabase auth reset
                // For now, simulate success
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('successText').textContent = '✅ Password reset link sent to your email!';
                btn.textContent = '✅ Sent!';
                setTimeout(function() {
                    btn.disabled = false;
                    btn.textContent = '📧 Send Reset Link';
                }, 3000);
            } catch (error) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorText').textContent = error.message || 'Something went wrong.';
                btn.disabled = false;
                btn.textContent = '📧 Send Reset Link';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendResetLink();
        });
    </script>
</body>
  </html>
