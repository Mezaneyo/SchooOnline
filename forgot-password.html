<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - MEZANEYO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 16px; max-width: 420px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .container h2 { text-align: center; color: #1a2a3a; margin-bottom: 10px; }
        .container p { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; font-family: 'Poppins', sans-serif; }
        .form-group input:focus { outline: none; border-color: #2d6a4f; }
        .btn { width: 100%; padding: 14px; background: #2d6a4f; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #1b4332; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
        .link a { color: #2d6a4f; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
        .success-msg, .error-msg { padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 14px; }
        .success-msg { background: #d4edda; color: #155724; }
        .error-msg { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Forgot Password</h2>
        <p>Enter your email address and we'll send you a reset link.</p>

        <div id="successMsg" class="success-msg">✅ <span id="successText">Reset link sent!</span></div>
        <div id="errorMsg" class="error-msg">❌ <span id="errorText">Error message</span></div>

        <form id="forgotForm" onsubmit="return false;">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@mezaneyo.school" required>
            </div>
            <button class="btn" id="resetBtn" onclick="sendResetLink()">📧 Send Reset Link</button>
        </form>

        <div class="link">
            Remember your password? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script>
        var SUPABASE_URL = 'https://nivmrwbusbeppdssmfpj.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_kwF_yAmJ5AWnbaIe57snrw_fXng7-6a';
        var supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function sendResetLink() {
            var email = document.getElementById('email').value.trim();
            var btn = document.getElementById('resetBtn');
            
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';

            if (!email || !email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Sending...';

            try {
                var { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: 'https://onlineschool-lake.vercel.app/reset-password.html'
                });

                if (error) throw error;

                showSuccess('✅ Password reset link sent to your email! Check your inbox.');
                btn.textContent = '✅ Sent!';
            } catch (error) {
                showError(error.message || 'Something went wrong. Please try again.');
                btn.disabled = false;
                btn.textContent = '📧 Send Reset Link';
            }
        }

        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendResetLink();
        });
    </script>
</body>
</html>
