<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - MEZANEYO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 16px; max-width: 420px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .container h2 { text-align: center; color: #1a2a3a; margin-bottom: 10px; }
        .container p { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; font-family: 'Poppins', sans-serif; }
        .form-group input:focus { outline: none; border-color: #2d6a4f; }
        .btn { width: 100%; padding: 14px; background: #2d6a4f; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #1b4332; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
        .link a { color: #2d6a4f; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
        .success-msg, .error-msg { padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 14px; }
        .success-msg { background: #d4edda; color: #155724; }
        .error-msg { background: #f8d7da; color: #721c24; }
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            background: #e0e0e0;
        }
        .password-strength .bar {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }
        .password-strength .bar.weak { width: 33%; background: #dc3545; }
        .password-strength .bar.medium { width: 66%; background: #ffc107; }
        .password-strength .bar.strong { width: 100%; background: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Reset Password</h2>
        <p>Enter your new password below.</p>

        <div id="successMsg" class="success-msg">✅ <span id="successText">Password reset successfully!</span></div>
        <div id="errorMsg" class="error-msg">❌ <span id="errorText">Error message</span></div>

        <form id="resetForm" onsubmit="return false;">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)" required>
                <div class="password-strength"><div class="bar" id="passwordBar"></div></div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            </div>
            <button class="btn" id="resetBtn" onclick="resetPassword()">🔒 Reset Password</button>
        </form>

        <div class="link">
            <a href="login.html">Back to Login</a>
        </div>
    </div>

    <script>
        var SUPABASE_URL = 'https://nivmrwbusbeppdssmfpj.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_kwF_yAmJ5AWnbaIe57snrw_fXng7-6a';
        var supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('newPassword').addEventListener('input', function() {
            var password = this.value;
            var bar = document.getElementById('passwordBar');
            
            if (password.length === 0) {
                bar.style.width = '0%';
                return;
            }
            
            var strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            if (strength <= 2) bar.className = 'bar weak';
            else if (strength <= 3) bar.className = 'bar medium';
            else bar.className = 'bar strong';
        });

        async function resetPassword() {
            var newPassword = document.getElementById('newPassword').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var btn = document.getElementById('resetBtn');
            
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';

            if (newPassword.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Resetting...';

            try {
                var { data, error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                showSuccess('✅ Password reset successfully! Redirecting to login...');
                btn.textContent = '✅ Done!';
                
                setTimeout(function() {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (error) {
                showError(error.message || 'Something went wrong. Please try again.');
                btn.disabled = false;
                btn.textContent = '🔒 Reset Password';
            }
        }

        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') resetPassword();
        });
    </script>
</body>
</html>
